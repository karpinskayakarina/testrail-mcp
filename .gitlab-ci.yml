stages:
  - deploy

deploy-production:
  stage: deploy
  image: node:20-alpine
  tags:
    - docker
  only:
    - main
  script:
    - npm install -g @railway/cli
    - railway version
    - railway status || true
    - railway up --detach --service testrail-mcp 2>&1 || echo "EXIT CODE $?"
  variables:
    RAILWAY_TOKEN: $RAILWAY_TOKEN
    RAILWAY_PROJECT_ID: 37a084fe-71f1-4e5f-906b-973d4f4bf022